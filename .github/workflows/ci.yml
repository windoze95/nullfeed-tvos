name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Build
        run: |
          xcodebuild \
            -scheme NullFeed \
            -project NullFeed.xcodeproj \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            build

      - name: Test
        run: |
          xcodebuild \
            -scheme NullFeed \
            -project NullFeed.xcodeproj \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            test
