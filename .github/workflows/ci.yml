name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download tvOS Simulator
        run: |
          # List available tvOS runtimes — if already installed, skip download
          if xcrun simctl list runtimes | grep -q tvOS; then
            echo "tvOS runtime already installed"
          else
            # Retry download — the simulator service can be slow to start on CI
            for i in 1 2 3; do
              if xcodebuild -downloadPlatform tvOS; then
                break
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done
            # Verify the runtime is now available
            xcrun simctl list runtimes | grep -q tvOS || { echo "tvOS runtime not available after retries"; exit 1; }
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme NullFeed \
            -project NullFeed.xcodeproj \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            build

      - name: Test
        run: |
          xcodebuild \
            -scheme NullFeed \
            -project NullFeed.xcodeproj \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            test
