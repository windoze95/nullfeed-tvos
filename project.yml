name: NullFeed
options:
  bundleIdPrefix: codes.julian.nullfeed
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
settings:
  base:
    DEVELOPMENT_TEAM: 2M54LKDR89
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  NullFeed:
    type: application
    platform: tvOS
    sources:
      - NullFeed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NullFeed tvOS App Store"
        Debug:
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: NullFeedTopShelf
    entitlements:
      path: NullFeed/NullFeed.entitlements
  NullFeedTopShelf:
    type: app-extension
    product: com.apple.product-type.tv-app-extension
    platform: tvOS
    sources:
      - NullFeedTopShelf
    info:
      path: NullFeedTopShelf/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.tv-top-shelf
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ContentProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed.TopShelf
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NullFeed tvOS TopShelf App Store"
        Debug:
          CODE_SIGN_STYLE: Automatic
    entitlements:
      path: NullFeedTopShelf/NullFeedTopShelf.entitlements
  NullFeedTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - NullFeedTests
    dependencies:
      - target: NullFeed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  NullFeed:
    build:
      targets:
        NullFeed: all
        NullFeedTopShelf: all
        NullFeedTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NullFeedTests
    archive:
      config: Release
