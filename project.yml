name: NullFeed
options:
  bundleIdPrefix: codes.julian.nullfeed
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
settings:
  base:
    DEVELOPMENT_TEAM: 2M54LKDR89
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  NullFeed:
    type: application
    platform: tvOS
    sources:
      - NullFeed
      - Shared
    info:
      path: NullFeed/Info.plist
      properties:
        # Track the version from the build settings instead of XcodeGen's literal
        # "1.0"/"1" defaults, so it stays correct whether Xcode reads it from this
        # base file or its generated Info.plist.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Register the custom URL scheme so the Top Shelf "play" action
        # (nullfeed://player/<id>) -- and any other deep link -- launches the app
        # and reaches NullFeedApp.onOpenURL. Xcode merges this with its generated
        # Info.plist (GENERATE_INFOPLIST_FILE), which still supplies the scalar
        # INFOPLIST_KEY_* values below.
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: codes.julian.nullfeed
            CFBundleURLSchemes:
              - nullfeed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NullFeed tvOS App Store"
        Debug:
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: NullFeedTopShelf
    entitlements:
      path: NullFeed/NullFeed.entitlements
      properties:
        # Push Notifications capability. "production" matches the TestFlight + App
        # Store APNs environment (the ship path). For a local debug build against
        # a sandbox gateway, switch to "development" and point the backend's APNs
        # environment at sandbox so the token environment matches.
        aps-environment: production
        # Shared container so the Top Shelf extension can read the session the
        # app mirrors into SharedDefaults. Must match SharedDefaults.appGroup.
        com.apple.security.application-groups:
          - group.codes.julian.nullfeed
  NullFeedTopShelf:
    type: app-extension
    product: com.apple.product-type.tv-app-extension
    platform: tvOS
    sources:
      - NullFeedTopShelf
      - Shared
    info:
      path: NullFeedTopShelf/Info.plist
      properties:
        CFBundleDisplayName: NullFeed TopShelf
        # Keep the extension's version in lockstep with the app (the App Store
        # requires they match); otherwise XcodeGen writes literal "1.0"/"1".
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiredDeviceCapabilities:
          - arm64
        NSExtension:
          NSExtensionPointIdentifier: com.apple.tv-top-shelf
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ContentProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed.TopShelf
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NullFeed tvOS TopShelf App Store"
        Debug:
          CODE_SIGN_STYLE: Automatic
    entitlements:
      path: NullFeedTopShelf/NullFeedTopShelf.entitlements
      properties:
        # Read side of the same shared container declared on the app target.
        com.apple.security.application-groups:
          - group.codes.julian.nullfeed
  NullFeedTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - NullFeedTests
    dependencies:
      - target: NullFeed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: codes.julian.nullfeed.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  NullFeed:
    build:
      targets:
        NullFeed: all
        NullFeedTopShelf: all
        NullFeedTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NullFeedTests
    archive:
      config: Release
